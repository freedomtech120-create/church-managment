<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Connect CMS - Ghana Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; }
        .active-tab { @apply bg-indigo-50 text-indigo-700 border-r-4 border-indigo-700; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; }
            main { padding: 0 !important; }
            .print-container { width: 100% !important; margin: 0 !important; padding: 20px !important; }
        }
        .print-only { display: none; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .ai-loading { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Persistence Helper
        const getInitialData = (key, fallback) => {
            const saved = localStorage.getItem(key);
            return saved ? JSON.parse(saved) : fallback;
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedMember, setSelectedMember] = useState(null);
            const [showSmsConfig, setShowSmsConfig] = useState(false);
            const [reportType, setReportType] = useState('financial');
            const [isAiDrafting, setIsAiDrafting] = useState(false);
            const [smsDraft, setSmsDraft] = useState('');
            
            // --- SETTINGS STATE ---
            const [churchSettings, setChurchSettings] = useState(() => getInitialData('cms_settings', {
                name: 'Grace Connect',
                logoUrl: '' // This will now store Base64 image data
            }));

            // --- DATA STATE ---
            const [groups, setGroups] = useState(() => getInitialData('cms_groups', [
                { id: 'women', name: "Women Fellowship", leader: "Sarah Smith", color: "rose" },
                { id: 'youth', name: "Youth Ministry", leader: "David Chen", color: "orange" },
                { id: 'children', name: "Children Ministry", leader: "Alice Wagner", color: "sky" },
                { id: 'men', name: "Men of Valor", leader: "Pastor Samuel", color: "slate" }
            ]));

            const [members, setMembers] = useState(() => getInitialData('cms_members', [
                { id: 1, name: "John Doe", email: "john@example.com", phone: "0244123456", role: "Member", ministry: "men", joined: "2023-01-15" },
                { id: 2, name: "Sarah Smith", email: "sarah@example.com", phone: "0205123456", role: "Elder", ministry: "women", joined: "2022-11-20" }
            ]));

            const [workers, setWorkers] = useState(() => getInitialData('cms_workers', [
                { id: 1, name: "Pastor Samuel", role: "Head Pastor", salary: 3000, phone: "0555900001", status: "Active" }
            ]));

            const [giving, setGiving] = useState(() => getInitialData('cms_giving', []));
            const [payroll, setPayroll] = useState(() => getInitialData('cms_payroll', []));
            const [messages, setMessages] = useState(() => getInitialData('cms_messages', []));
            
            const [smsConfig, setSmsConfig] = useState(() => getInitialData('cms_sms_config', {
                provider: 'mnotify',
                apiKey: '',
                senderId: 'GRACE_CMS'
            }));

            // --- AUTO-SAVE ---
            useEffect(() => localStorage.setItem('cms_settings', JSON.stringify(churchSettings)), [churchSettings]);
            useEffect(() => localStorage.setItem('cms_groups', JSON.stringify(groups)), [groups]);
            useEffect(() => localStorage.setItem('cms_members', JSON.stringify(members)), [members]);
            useEffect(() => localStorage.setItem('cms_workers', JSON.stringify(workers)), [workers]);
            useEffect(() => localStorage.setItem('cms_giving', JSON.stringify(giving)), [giving]);
            useEffect(() => localStorage.setItem('cms_payroll', JSON.stringify(payroll)), [payroll]);
            useEffect(() => localStorage.setItem('cms_messages', JSON.stringify(messages)), [messages]);
            useEffect(() => localStorage.setItem('cms_sms_config', JSON.stringify(smsConfig)), [smsConfig]);

            // --- STATS ---
            const stats = useMemo(() => {
                const totalMembers = members.length;
                const income = giving.reduce((acc, curr) => acc + curr.amount, 0);
                const expense = payroll.reduce((acc, curr) => acc + curr.amount, 0);
                const groupStats = groups.map(g => ({
                    ...g,
                    count: members.filter(m => m.ministry === g.id).length
                }));
                return { totalMembers, income, expense, balance: income - expense, groupStats };
            }, [members, giving, payroll, groups]);

            // --- HANDLERS ---
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setChurchSettings(prev => ({ ...prev, logoUrl: reader.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleUpdateSettings = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                setChurchSettings(prev => ({
                    ...prev,
                    name: fd.get('churchName')
                }));
                alert("Settings updated successfully!");
            };

            const draftWithAi = async (promptType) => {
                setIsAiDrafting(true);
                const apiKey = "";
                const systemPrompt = `You are a church administrative assistant in Ghana for ${churchSettings.name}. Draft a short, warm SMS for a Ghanaian congregation. Use local terminology where appropriate (e.g., 'Greetings in the name of the Lord', 'God bless you'). Keep it under 160 characters. No hashtags.`;
                const userPrompts = {
                    reminder: "Draft a reminder for this Sunday's service at 8:30 AM.",
                    welcome: "Draft a welcome message for a first-time visitor in Accra.",
                    giving: "Draft a reminder for Tithes and Covenant Seeds.",
                    youth: "Draft an invite for the Friday Night Youth Fire meeting at 6:30 PM."
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userPrompts[promptType] }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) setSmsDraft(text.trim());
                } catch (error) {
                    console.error("AI Error:", error);
                } finally {
                    setIsAiDrafting(false);
                }
            };

            const handleAddMember = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                setMembers([{
                    id: Date.now(),
                    name: fd.get('name'),
                    role: fd.get('role'),
                    ministry: fd.get('ministry'),
                    phone: fd.get('phone'),
                    joined: new Date().toISOString().split('T')[0]
                }, ...members]);
                e.target.reset();
            };

            const handleSendSms = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const target = fd.get('target');
                const content = fd.get('message');
                
                let recipientsCount = 0;
                if (target === 'all') recipientsCount = members.length;
                else recipientsCount = members.filter(m => m.ministry === target).length;

                const newMessage = {
                    id: Date.now(),
                    content,
                    target,
                    recipients: recipientsCount,
                    date: new Date().toLocaleString(),
                    status: 'Sent'
                };

                setMessages([newMessage, ...messages]);
                setSmsDraft('');
                e.target.reset();
                alert(`Broadcast queued for ${recipientsCount} recipients!`);
            };

            const openNativeSms = (phone, msg) => {
                window.open(`sms:${phone}?body=${encodeURIComponent(msg || `Greetings from ${churchSettings.name}!`)}`);
            };

            const handleAddWorker = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                setWorkers([{
                    id: Date.now(),
                    name: fd.get('name'),
                    role: fd.get('role'),
                    salary: parseFloat(fd.get('salary')),
                    status: "Active"
                }, ...workers]);
                e.target.reset();
            };

            const handleAddGiving = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const memberIdVal = fd.get('memberId');
                setGiving([{
                    id: Date.now(),
                    memberId: memberIdVal === "general" ? null : parseInt(memberIdVal),
                    amount: parseFloat(fd.get('amount')),
                    type: fd.get('type'),
                    date: new Date().toISOString().split('T')[0]
                }, ...giving]);
                e.target.reset();
            };

            const processPayroll = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const worker = workers.find(w => w.id === parseInt(fd.get('workerId')));
                if (!worker) return;
                setPayroll([{
                    id: Date.now(),
                    workerId: worker.id,
                    amount: worker.salary,
                    month: fd.get('month'),
                    date: new Date().toISOString().split('T')[0]
                }, ...payroll]);
                e.target.reset();
            };

            const printReport = () => { window.print(); };

            // --- MODALS ---
            const MemberModal = ({ member }) => {
                if (!member) return null;
                const memberGiving = giving.filter(g => g.memberId === member.id);
                const totalGiven = memberGiving.reduce((acc, curr) => acc + curr.amount, 0);

                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 no-print">
                        <div className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                            <div className="p-6 border-b flex justify-between items-start bg-indigo-50">
                                <div className="flex items-center gap-4">
                                    <div className="w-16 h-16 rounded-full bg-indigo-600 flex items-center justify-center text-white text-2xl font-bold overflow-hidden">
                                        {churchSettings.logoUrl ? (
                                            <img src={churchSettings.logoUrl} className="w-full h-full object-cover" alt="Logo" />
                                        ) : (
                                            member.name.charAt(0)
                                        )}
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-800">{member.name}</h3>
                                        <p className="text-sm text-indigo-600 font-medium uppercase tracking-wider">{member.role}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => openNativeSms(member.phone, "")} className="p-2 bg-green-100 text-green-700 rounded-full hover:bg-green-200"><Icon name="message-square" /></button>
                                    <button onClick={() => setSelectedMember(null)} className="p-2 hover:bg-white rounded-full transition-colors"><Icon name="x" /></button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gray-50 p-4 rounded-xl">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Ministry</p>
                                        <p className="font-semibold text-gray-700 capitalize">{groups.find(g => g.id === member.ministry)?.name || 'General'}</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Phone</p>
                                        <p className="font-semibold text-gray-700">{member.phone}</p>
                                    </div>
                                    <div className="bg-indigo-600 p-4 rounded-xl text-white col-span-2">
                                        <p className="text-[10px] font-bold text-indigo-200 uppercase mb-1">Total Contributions</p>
                                        <p className="text-xl font-bold">GH₵ {totalGiven.toLocaleString()}</p>
                                    </div>
                                </div>
                                <div>
                                    <h4 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Icon name="history" size={16} /> Financial History</h4>
                                    <div className="border rounded-xl overflow-hidden">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-gray-50 text-gray-400 font-bold uppercase text-[10px]">
                                                <tr><th className="px-4 py-2">Date</th><th className="px-4 py-2">Type</th><th className="px-4 py-2 text-right">Amount</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {memberGiving.map(g => (
                                                    <tr key={g.id}>
                                                        <td className="px-4 py-2 text-gray-500">{g.date}</td>
                                                        <td className="px-4 py-2 text-gray-700 font-medium">{g.type}</td>
                                                        <td className="px-4 py-2 text-right font-bold text-green-600">GH₵ {g.amount}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const SmsConfigModal = () => {
                if (!showSmsConfig) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4 no-print">
                        <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-gray-800">Ghana SMS Gateway</h3>
                                <button onClick={() => setShowSmsConfig(false)} className="text-gray-400 hover:text-gray-600"><Icon name="x" /></button>
                            </div>
                            <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); setShowSmsConfig(false); alert("Settings saved!"); }}>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-gray-400 uppercase">Provider</label>
                                    <select className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm" value={smsConfig.provider} onChange={(e) => setSmsConfig({...smsConfig, provider: e.target.value})}>
                                        <option value="mnotify">MNotify</option><option value="arkesel">Arkesel</option><option value="simulator">Simulator</option>
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-gray-400 uppercase">Sender ID</label>
                                    <input className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm" value={smsConfig.senderId} onChange={(e) => setSmsConfig({...smsConfig, senderId: e.target.value})} maxLength="11" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-gray-400 uppercase">API Key</label>
                                    <input type="password" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm" value={smsConfig.apiKey} onChange={(e) => setSmsConfig({...smsConfig, apiKey: e.target.value})} />
                                </div>
                                <button type="submit" className="w-full bg-indigo-600 text-white rounded-xl py-2 font-bold">Update Gateway</button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    <MemberModal member={selectedMember} />
                    <SmsConfigModal />

                    {/* SIDEBAR */}
                    <aside className="w-full md:w-64 bg-white border-r border-gray-200 no-print">
                        <div className="p-6 sticky top-0">
                            <div className="flex items-center gap-3 text-indigo-700 font-bold text-xl mb-8 overflow-hidden">
                                {churchSettings.logoUrl ? (
                                    <img src={churchSettings.logoUrl} className="w-9 h-9 rounded-lg object-cover" alt="Logo" />
                                ) : (
                                    <Icon name="church" size={28} />
                                )}
                                <span className="truncate">{churchSettings.name}</span>
                            </div>
                            <nav className="space-y-1">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                                    { id: 'members', label: 'Members', icon: 'users' },
                                    { id: 'ministries', label: 'Ministries', icon: 'layers' },
                                    { id: 'workers', label: 'Staff/Workers', icon: 'user-cog' },
                                    { id: 'communication', label: 'SMS Center', icon: 'message-circle' },
                                    { id: 'payroll', label: 'Payroll', icon: 'wallet' },
                                    { id: 'giving', label: 'Financials', icon: 'hand-coins' },
                                    { id: 'reports', label: 'Reports', icon: 'printer' },
                                    { id: 'settings', label: 'Settings', icon: 'settings' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition-all ${
                                            activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 border-r-4 border-indigo-700' : 'text-gray-500 hover:bg-gray-50'
                                        }`}>
                                        <Icon name={tab.icon} size={18} />
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-4 md:p-8 bg-gray-50 overflow-y-auto">
                        <header className="mb-8 flex justify-between items-start no-print">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 capitalize tracking-tight">{activeTab.replace('-', ' ')}</h2>
                                <p className="text-sm text-gray-400">{churchSettings.name} Ghana Management</p>
                            </div>
                            {activeTab === 'reports' && (
                                <button onClick={printReport} className="bg-indigo-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 font-bold hover:bg-indigo-700 transition-colors">
                                    <Icon name="printer" size={18} /> Print Official Report
                                </button>
                            )}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase mb-1">Total Members</p>
                                        <div className="text-2xl font-bold text-gray-800">{stats.totalMembers}</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase mb-1">Total Income</p>
                                        <div className="text-2xl font-bold text-green-600">GH₵ {stats.income.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase mb-1">Total Expenses</p>
                                        <div className="text-2xl font-bold text-rose-600">GH₵ {stats.expense.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <p className="text-xs font-bold text-gray-400 uppercase mb-1">Net Balance</p>
                                        <div className="text-2xl font-bold text-indigo-600">GH₵ {stats.balance.toLocaleString()}</div>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                    <h3 className="font-bold text-gray-700 mb-6 flex items-center gap-2"><Icon name="bar-chart-3" size={18} /> Ministry Distribution</h3>
                                    <div className="space-y-4">
                                        {stats.groupStats.map(g => (
                                            <div key={g.id}>
                                                <div className="flex justify-between text-xs font-bold uppercase mb-1"><span>{g.name}</span><span>{g.count}</span></div>
                                                <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                                    <div className={`h-full bg-${g.color}-500 transition-all duration-700`} style={{ width: `${(g.count / (stats.totalMembers || 1)) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="max-w-2xl space-y-6">
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                    <h3 className="font-bold text-gray-800 mb-6 flex items-center gap-2">
                                        <Icon name="palette" className="text-indigo-600" /> Branding & Identity
                                    </h3>
                                    <form onSubmit={handleUpdateSettings} className="space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">Church Name</label>
                                            <input required name="churchName" defaultValue={churchSettings.name} className="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none" />
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">Church Logo</label>
                                            <div className="flex flex-col sm:flex-row items-center gap-6 p-6 border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50/50">
                                                <div className="w-24 h-24 bg-white rounded-2xl flex items-center justify-center border border-gray-200 shadow-sm overflow-hidden flex-shrink-0">
                                                    {churchSettings.logoUrl ? (
                                                        <img src={churchSettings.logoUrl} className="w-full h-full object-cover" alt="Logo Preview" />
                                                    ) : (
                                                        <Icon name="image" className="text-gray-300" size={32} />
                                                    )}
                                                </div>
                                                <div className="flex-1 text-center sm:text-left space-y-3">
                                                    <p className="text-sm font-semibold text-gray-700">Attach Official Church Logo</p>
                                                    <p className="text-xs text-gray-400 leading-relaxed">Upload a PNG or JPG file. This will be used in the sidebar and official reports.</p>
                                                    <div className="relative inline-block">
                                                        <input 
                                                            type="file" 
                                                            accept="image/*" 
                                                            onChange={handleLogoUpload}
                                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                                        />
                                                        <button type="button" className="px-4 py-2 bg-white border border-gray-200 rounded-lg text-xs font-bold text-indigo-600 shadow-sm hover:bg-gray-50">
                                                            Select Image File
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                                            <Icon name="save" size={18} /> Save Settings
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'members' && (
                            <div className="space-y-6">
                                <form onSubmit={handleAddMember} className="bg-white p-6 rounded-2xl border border-gray-100 grid grid-cols-1 md:grid-cols-5 gap-4 items-end no-print shadow-sm">
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Full Name</label>
                                        <input required name="name" placeholder="John Mensah" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Ministry</label>
                                        <select name="ministry" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm">{groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}<option value="none">None</option></select></div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Role</label>
                                        <select name="role" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm"><option>Member</option><option>Elder</option><option>Visitor</option></select></div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Phone</label>
                                        <input required name="phone" placeholder="024XXXXXXX" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm" /></div>
                                    <button type="submit" className="bg-indigo-600 text-white font-bold py-2.5 rounded-lg text-sm">Add Member</button>
                                </form>
                                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-400 font-bold uppercase text-[10px]">
                                            <tr><th className="px-6 py-4">Member Name</th><th className="px-6 py-4">Ministry</th><th className="px-6 py-4">Phone</th><th className="px-6 py-4 text-right">Action</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {members.map(m => (
                                                <tr key={m.id} className="hover:bg-gray-50 group">
                                                    <td className="px-6 py-4 font-bold text-gray-800">{m.name}</td>
                                                    <td className="px-6 py-4"><span className={`text-[10px] font-bold px-2 py-1 rounded bg-${groups.find(g => g.id === m.ministry)?.color || 'gray'}-50 text-${groups.find(g => g.id === m.ministry)?.color || 'gray'}-600 uppercase`}>{groups.find(g => g.id === m.ministry)?.name || 'General'}</span></td>
                                                    <td className="px-6 py-4 text-gray-400">{m.phone}</td>
                                                    <td className="px-6 py-4 text-right space-x-2">
                                                        <button onClick={() => setSelectedMember(m)} className="p-2 text-indigo-400 hover:text-indigo-600 bg-indigo-50 rounded-lg"><Icon name="eye" size={16}/></button>
                                                        <button onClick={() => setMembers(members.filter(x => x.id !== m.id))} className="p-2 text-gray-200 hover:text-rose-500 rounded-lg"><Icon name="trash-2" size={16}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'communication' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                            <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="send" size={18} className="text-indigo-600"/> Broadcast SMS (Ghana)</h3>
                                            <form onSubmit={handleSendSms} className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Recipients Group</label>
                                                        <select name="target" className="w-full bg-gray-50 border-0 rounded-lg p-2.5 text-sm">
                                                            <option value="all">Full Congregation ({members.length})</option>
                                                            {groups.map(g => (<option key={g.id} value={g.id}>{g.name} ({members.filter(m => m.ministry === g.id).length})</option>))}
                                                        </select>
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Gateway Info</label>
                                                        <div className="w-full bg-gray-100 rounded-lg p-2.5 text-sm text-gray-500 font-semibold truncate">{smsConfig.provider.toUpperCase()} : {smsConfig.senderId}</div>
                                                    </div>
                                                </div>
                                                <div className="space-y-1">
                                                    <div className="flex justify-between items-end">
                                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Message Content</label>
                                                        <span className={`text-[10px] font-bold ${smsDraft.length > 160 ? 'text-rose-500' : 'text-gray-400'}`}>{smsDraft.length} / 160</span>
                                                    </div>
                                                    <textarea required name="message" value={smsDraft} onChange={(e) => setSmsDraft(e.target.value)} rows="4" className="w-full bg-gray-50 border-0 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500" placeholder="Greetings in the name of the Lord..." />
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2"><Icon name="zap" size={18} /> Send Bulk SMS</button>
                                            </form>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-indigo-900 text-white p-6 rounded-2xl shadow-xl relative overflow-hidden">
                                            <div className="relative z-10">
                                                <h4 className="font-bold flex items-center gap-2 mb-4"><Icon name="sparkles" size={18}/> AI Templates</h4>
                                                <div className="grid grid-cols-1 gap-2">
                                                    {['reminder', 'welcome', 'giving', 'youth'].map(id => (
                                                        <button key={id} onClick={() => draftWithAi(id)} className="w-full bg-white/10 hover:bg-white/20 p-2.5 rounded-xl text-left text-xs font-semibold transition-all">Draft {id.charAt(0).toUpperCase() + id.slice(1)} Message</button>
                                                    ))}
                                                </div>
                                            </div>
                                            {isAiDrafting && <div className="absolute inset-0 bg-indigo-900/80 flex items-center justify-center"><Icon name="loader-2" className="animate-spin text-white" /></div>}
                                        </div>
                                        <button onClick={() => setShowSmsConfig(true)} className="w-full py-2 bg-white border border-gray-100 rounded-lg text-xs font-bold text-indigo-600 uppercase tracking-wider hover:bg-indigo-50">Configure Gateway</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'giving' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl border border-gray-100 no-print shadow-sm">
                                    <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="plus-circle" className="text-indigo-600" /> Record Financial Entry</h3>
                                    <form onSubmit={handleAddGiving} className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                                        <select name="memberId" className="bg-gray-50 border-0 rounded-lg p-2.5 text-sm w-full"><option value="general">Anonymous Offering</option>{members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select>
                                        <input required name="amount" type="number" step="0.01" placeholder="Amount GH₵" className="bg-gray-50 border-0 rounded-lg p-2.5 text-sm w-full" />
                                        <select name="type" className="bg-gray-50 border-0 rounded-lg p-2.5 text-sm w-full"><option>Tithe</option><option>Offering</option><option>Thanksgiving</option><option>Covenant Seed</option></select>
                                        <button type="submit" className="bg-indigo-600 text-white font-bold py-2.5 rounded-lg text-sm">Record GH₵</button>
                                    </form>
                                </div>
                                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-400 font-bold uppercase text-[10px]"><tr><th className="px-6 py-4">Source</th><th className="px-6 py-4">Type</th><th className="px-6 py-4">Date</th><th className="px-6 py-4 text-right">Amount</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100">{giving.map(g => (<tr key={g.id}><td className="px-6 py-4 font-bold">{g.memberId ? members.find(m => m.id === g.memberId)?.name : 'Anonymous Offering'}</td><td className="px-6 py-4 text-gray-500">{g.type}</td><td className="px-6 py-4 text-gray-400">{g.date}</td><td className="px-6 py-4 text-right font-bold text-green-600">GH₵ {g.amount.toLocaleString()}</td></tr>))}</tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="space-y-6 print-container">
                                <div className="flex gap-4 mb-6 no-print">
                                    {['financial', 'membership', 'payroll'].map(type => (
                                        <button key={type} onClick={() => setReportType(type)} className={`px-4 py-2 rounded-xl text-sm font-bold capitalize transition-all ${reportType === type ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-gray-500 border'}`}>{type} Official Report</button>
                                    ))}
                                </div>
                                <div className="bg-white p-12 rounded-3xl border border-gray-200 shadow-sm print:border-0 print:shadow-none">
                                    <div className="text-center mb-10">
                                        {churchSettings.logoUrl && <img src={churchSettings.logoUrl} className="w-24 h-24 mx-auto mb-4 rounded-xl object-cover" />}
                                        <h1 className="text-3xl font-bold text-gray-900 uppercase tracking-tighter">{churchSettings.name}</h1>
                                        <p className="text-gray-500 font-bold text-xs mt-2 uppercase tracking-widest">Official {reportType} Status Report</p>
                                        <p className="text-gray-400 text-[10px] mt-1 italic">Generated on {new Date().toLocaleDateString()}</p>
                                    </div>
                                    {reportType === 'financial' && (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-3 gap-6 py-6 border-y border-gray-100">
                                                <div className="text-center"><p className="text-[10px] text-gray-400 uppercase font-bold">Total Income</p><p className="text-xl font-bold text-green-600">GH₵ {stats.income}</p></div>
                                                <div className="text-center"><p className="text-[10px] text-gray-400 uppercase font-bold">Expenditure</p><p className="text-xl font-bold text-rose-600">GH₵ {stats.expense}</p></div>
                                                <div className="text-center"><p className="text-[10px] text-gray-400 uppercase font-bold">Net Balance</p><p className="text-xl font-bold text-indigo-600">GH₵ {stats.balance}</p></div>
                                            </div>
                                            <table className="w-full text-left text-xs">
                                                <thead className="bg-gray-50 text-gray-400 font-bold uppercase"><tr><th className="p-3">Source</th><th className="p-3">Type</th><th className="p-3 text-right">Amount</th></tr></thead>
                                                <tbody>{giving.map(g => <tr key={g.id} className="border-b border-gray-50"><td className="p-3 font-semibold">{g.memberId ? members.find(m => m.id === g.memberId)?.name : 'Offering'}</td><td className="p-3">{g.type}</td><td className="p-3 text-right font-bold text-gray-700">GH₵ {g.amount}</td></tr>)}</tbody>
                                            </table>
                                        </div>
                                    )}
                                    <div className="mt-20 pt-8 border-t border-dashed border-gray-300 flex justify-between items-end">
                                        <div className="text-center w-48 border-t border-gray-300 pt-2 text-[10px] text-gray-400 font-bold uppercase">Pastor's Signature</div>
                                        <div className="text-center w-48 border-t border-gray-300 pt-2 text-[10px] text-gray-400 font-bold uppercase">Treasurer's Signature</div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* Placeholder for missing tabs to keep system functional */}
                        {(activeTab === 'payroll' || activeTab === 'ministries' || activeTab === 'workers') && (
                            <div className="bg-white p-12 rounded-2xl text-center border border-gray-100 shadow-sm">
                                <Icon name="layout" className="mx-auto text-indigo-100 mb-4" size={48} />
                                <h3 className="font-bold text-gray-800">Module Available</h3>
                                <p className="text-gray-400 text-sm">This section is ready for your Ghana branch data entries.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
